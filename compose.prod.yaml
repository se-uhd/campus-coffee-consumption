name: campus-coffee-consumption-prod

# Cloud Run prod deployment. The prod profile enforces authentication, turns Swagger and the /api/dev
# endpoints off, requires a real JWT secret and https base URL (no insecure fallbacks), and loads NO fixture
# data: prod has real members, and the first admin is created from BOOTSTRAP_ADMIN_* on first startup. The
# database is managed Cloud SQL, connected via the prod profile's socket-factory datasource (see
# application.yaml), NOT an in-container sidecar, so the append-only money ledger survives every redeploy.
#
# All secrets and the public URL come from deploy.env (gitignored; copy deploy.env.example and fill it in).
# Deploy with scripts/deploy-cloudrun.sh. The Cloud Run runtime service account needs the Cloud SQL Client
# role, and the Cloud SQL Admin API must be enabled, for the socket factory to connect.
#
# This file is the cloud deploy only; for local development use `gradle :application:bootRun` or
# `docker compose up` (the dev compose.yaml), which run the dev profile against a local Postgres.

services:
  app:
    build:
      context: .
    container_name: campus-coffee-consumption-app-prod
    ports:
      - '8080:8080'
    restart: on-failure
    # deploy.env supplies JWT_SECRET, DB_PASSWORD, CAMPUS_COFFEE_APP_BASE_URL, and the BOOTSTRAP_ADMIN_*
    # credentials. `gcloud run compose up` and local `docker compose` both load env_file onto the container.
    env_file:
      - deploy.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
