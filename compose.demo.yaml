name: campus-coffee-consumption-demo

# Public DEMO deployment to Cloud Run. It activates the `prod,demo` profiles (see application.yaml): every
# prod hardening (managed Cloud SQL, required https base URL via PublicBaseUrlGuard, real JWT secret, Swagger
# and the /api/dev endpoints off) plus the seed-data overlay. The database is cleared and reseeded with the
# full fixture + DevDemoDataLoader dataset on every boot, so the demo is deterministic, self-cleaning, and
# discards any prior deployment's data. The login admin is the fixture admin (jane_doe), not BOOTSTRAP_ADMIN_*.
#
# Deploy with: MAX_INSTANCES=1 scripts/deploy-cloudrun.sh compose.demo.yaml
# The single-instance cap matters: the boot-time reset must not run on two instances at once.
#
# Secrets and the public URL come from deploy.env (gitignored). For real members use compose.prod.yaml; for
# local development use `gradle :application:bootRun` or `docker compose up`.

services:
  app:
    build:
      context: .
    container_name: campus-coffee-consumption-app-demo
    ports:
      - '8080:8080'
    restart: on-failure
    env_file:
      - deploy.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod,demo
