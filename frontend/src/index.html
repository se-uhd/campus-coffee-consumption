<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SE@UHD Coffee</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Tint the mobile browser chrome with the SE@UHD brand red. -->
    <meta name="theme-color" content="#c61826" />
    <!-- The capability token appears in the /login/{token} URL; keep it from leaking via the Referer header. -->
    <meta name="referrer" content="no-referrer" />
    <!-- Favicon: a coffee cup in the SE@UHD brand red (#c61826) on a transparent background for browser tabs
         (legible on light and dark), with a white-tile variant for the home-screen/PWA icons. SVG for modern
         browsers, with PNG and ICO fallbacks. -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <cc-root></cc-root>
  </body>
</html>
