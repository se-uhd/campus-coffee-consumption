# Qodana configuration: JetBrains' code-quality scanner, which runs the IntelliJ inspection engine
# headlessly. It complements (does not replace) the fast ktlint/detekt gates in `gradle build`: it catches
# the idiomatic-Kotlin issues that live only in the IDE inspections (a redundant SAM constructor, a lambda
# that belongs outside the parentheses, a redundant `public` modifier, unused symbols), none of which
# ktlint (formatting) or detekt (its default ruleset plus our custom KDoc rules) reports.
#
# The CI job is .github/workflows/qodana.yml. Locally: `qodana scan` (needs the Qodana CLI and Docker).
version: "1.0"

# The free JVM Community linter, which bundles the Java and Kotlin inspections. Pinned to a release tag
# (not :latest) so a new linter version cannot silently change the findings on an unrelated commit; bump it
# deliberately, like the other tool pins in the repository.
linter: jetbrains/qodana-jvm-community:2026.1

# Use the broad `recommended` profile, NOT Qodana's default `starter` profile. `starter` is a curated subset
# aimed at probable bugs and high-severity issues; the redundant-SAM / move-lambda / redundant-visibility
# cleanups this job exists to catch are Warning-level style inspections that only `recommended` (which
# mirrors the IDE's own default profile) enables.
profile:
  name: qodana.recommended

# The project targets JDK 25 (the single source of truth is gradle/libs.versions.toml; mise.toml pins the
# same). Open and resolve the Gradle model with a matching JDK so the type-resolution-dependent inspections
# actually run, e.g. the redundant SAM-constructor check must know that IdGenerator is a `fun interface`.
projectJDK: "25"

# --- Enforcement -----------------------------------------------------------------------------------------
# `failThreshold: 0` makes Qodana a blocking gate: the job fails if ANY problem is reported. With the
# false-positive inspections excluded below, a clean tree reports zero problems and the job passes, so no
# baseline is needed. If you later prefer to grandfather a batch of findings instead of excluding a whole
# inspection, commit a baseline: run the workflow, download the `qodana-sarif` artifact, commit its
# `qodana.sarif.json` at the repo root as `qodana.sarif.baseline`, and uncomment the `args: --baseline,...`
# line in the Qodana Scan step of .github/workflows/qodana.yml so only NEW problems count.
failThreshold: 0

# --- Suppressions (false positives) ----------------------------------------------------------------------
# The first run reported only these two inspections, both systematic false positives for this project, so
# they are disabled (rather than grandfathered in a baseline) to keep new occurrences quiet going forward:
#
# - UnusedSymbol: the Community linter has no Spring/JPA awareness, so it does not recognize @RestController
#   endpoint handlers, @Bean factory methods, @Configuration/@ConfigurationProperties classes, or the JPA
#   @PrePersist/@PreUpdate callbacks as framework entry points, and reported all ~45 of them as "never
#   used". IntelliJ Ultimate (with the Spring plugin) does not flag these, so disabling the inspection makes
#   this scan match the IDE. The idiomatic-Kotlin inspections this job exists for are a different rule set
#   and stay active.
# - UnstableApiUsage: every occurrence is the Gradle Kotlin DSL's own @Incubating API used in the build
#   scripts (settings.gradle.kts, build.gradle.kts), which is expected and unavoidable.
exclude:
  - name: UnusedSymbol
  - name: UnstableApiUsage
