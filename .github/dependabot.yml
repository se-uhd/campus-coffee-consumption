# Dependabot keeps the GitHub Actions, Gradle (Kotlin/Java) dependencies, the frontend npm dependencies,
# and the Dockerfile base images current. Most backend versions live in the gradle/libs.versions.toml
# catalog, which the gradle ecosystem updates (BOM-managed dependencies without an explicit version
# follow the Spring Boot BOM and are not bumped here); the frontend versions live in frontend/package.json.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Workflow actions in .github/workflows/ (actions/checkout, actions/upload-artifact, jdx/mise-action,
  # JetBrains/qodana-action). The wildcard group already covers every `uses:` action, qodana-action
  # included. Caveat: dependabot bumps the action only; the Qodana linter image pinned in qodana.yaml
  # (jetbrains/qodana-jvm-community) is not a manifest dependabot parses, so bump that tag by hand to keep
  # it on the same Qodana release as the action.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Gradle dependencies and plugins, resolved from the version catalog (covers the root build and
  # the build-logic convention plugins, which reference the same catalog).
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Bundle minor and patch bumps into one PR; major upgrades get their own PR for careful review.
      gradle-minor-and-patch:
        update-types: ["minor", "patch"]

  # Frontend npm dependencies (the Angular SPA in frontend/). The Angular packages move together each
  # release, so a major (e.g. an Angular major) gets its own PR while minor/patch bumps are batched.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Keep @types/node on the major that matches the pinned Node runtime (Node 24 LTS, set in mise.toml).
      # A major @types/node bump tracks a newer Node release that stays "Current" until its October LTS
      # (e.g. Node 26 is Current until October 2026), so the types must never run ahead of the runtime. Bump
      # this by hand when the project itself moves to the next Node LTS.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # Dockerfile base images. Only the build-stage jdxcode/mise image is bumped here; its version is the
  # mise tool version, independent of the bundled JDK. The runtime stage's eclipse-temurin tag is the
  # hand-maintained Java pin (kept in sync with the version catalog and mise.toml by
  # scripts/check-toolchain-versions.sh), so it is ignored to keep that single source of truth intact.
  # Note: the postgres:18-alpine tag in compose.yaml/compose.prod.yaml (and the same tag used by CI and
  # Testcontainers) is NOT a Dockerfile dependency and is bumped by hand; keep those occurrences in sync.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: eclipse-temurin
