# Qodana: JetBrains' code-quality scanner, run as a SEPARATE job from build.yml. It runs the IntelliJ
# inspection engine headlessly so CI catches the idiomatic-Kotlin issues that ktlint and detekt do not —
# a redundant SAM constructor, a lambda that belongs outside the parentheses, a redundant `public`
# modifier, unused symbols, and the rest of the IDE's default checks. The linter, profile, JDK, and
# enforcement settings live in the root qodana.yaml (Community linter + the `recommended` profile, which
# mirrors IntelliJ's default inspection profile).
name: Qodana

on:
  # Run on PRs to main (the review gate, where findings matter) and on pushes to main (to keep the
  # main-branch results / any future baseline current). Intentionally NOT on every feature-branch push the
  # way build.yml is: a Qodana scan is much heavier than the Gradle build.
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: read

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # let the action post the inspection summary as a PR comment
      security-events: write # upload the SARIF report to the repository's Code scanning tab
    steps:
      - uses: actions/checkout@v7
        with:
          # Qodana diffs the change against the base ref to label problems as new vs. pre-existing, so it
          # needs full history, mirroring build.yml.
          fetch-depth: 0
          persist-credentials: false # no step pushes back to the repository

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1.3
        # qodana.yaml sets `failThreshold: 0`, so this job fails on any problem above the baseline. Once
        # qodana.sarif.baseline is committed (see qodana.yaml), uncomment to count only NEW problems:
        # with:
        #   args: --baseline,qodana.sarif.baseline
        env:
          # Optional. The Community linter needs no license, so the scan runs without this. Setting the
          # QODANA_TOKEN repository secret (a Qodana Cloud project token) additionally uploads results to
          # Qodana Cloud and enables its server-side quality gate; the PR comment and SARIF work without it.
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Upload Qodana results to code scanning
        # Upload even when the scan reports problems, so the findings always reach the Security tab. Needs
        # GitHub code scanning, which is free for public repositories (GHAS for private ones); drop this
        # step if code scanning is unavailable — the PR summary comment still reports the findings.
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json

      - name: Upload Qodana SARIF as an artifact
        # Makes the SARIF downloadable from the run as a file (not just the Security tab). Run this workflow
        # manually (the Run workflow button), download the `qodana-sarif` artifact, and commit it at the repo
        # root as qodana.sarif.baseline to seed the baseline (see qodana.yaml). `if: always()` so the first,
        # threshold-failing run still yields the file.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qodana-sarif
          path: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          if-no-files-found: warn
