# Qodana: JetBrains' code-quality scanner, run as a SEPARATE job from build.yml. It runs the IntelliJ
# inspection engine headlessly so CI catches the idiomatic issues that the fast gates do not.
#
# Two independent jobs, one per stack:
#   - `qodana` scans the Kotlin/JVM backend (the JVM Community linter; the linter, profile, JDK, and
#     enforcement settings live in the root qodana.yaml). It catches what ktlint/detekt do not: a
#     redundant SAM constructor, a lambda that belongs outside the parentheses, a redundant `public`
#     modifier, unused symbols, and the rest of the IDE's default Kotlin checks.
#   - `qodana-frontend` scans the Angular SPA (the JS Community linter; settings in frontend/qodana.yaml).
#     It is the IDE-inspection counterpart to the ESLint + Stylelint gate that `npm run lint` runs.
# Both use the `recommended` profile (mirrors the IDE's default inspection profile) and failThreshold: 0.
name: Qodana

on:
  # Run on every push (every branch, like build.yml) so feature-branch work is scanned before it reaches
  # main, and on PRs to main (the review gate). A Qodana scan is heavier than the Gradle build, but catching
  # the idiomatic findings on the feature branch (rather than only at merge) is worth it.
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "**" ]
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: read

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the inspection summary as a PR comment (when triggered by a PR)
      checks: write        # publish findings as check-run annotations (used on push, where there is no PR)
      actions: read        # let the action read this workflow run for its status report (telemetry)
    steps:
      - uses: actions/checkout@v7
        with:
          # Qodana diffs the change against the base ref to label problems as new vs. pre-existing, so it
          # needs full history, mirroring build.yml.
          fetch-depth: 0
          persist-credentials: false # no step pushes back to the repository

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1.3
        # qodana.yaml sets `failThreshold: 0`, so this job fails on any problem above the baseline. Once
        # qodana.sarif.baseline is committed (see qodana.yaml), uncomment to count only NEW problems:
        # with:
        #   args: --baseline,qodana.sarif.baseline
        #
        # Intentionally no QODANA_TOKEN here: the free qodana-jvm-community linter runs without a Qodana Cloud
        # connection, so this job needs no token. A Qodana Cloud project supports only one linter, and the
        # frontend job's project is bound to qodana-js; passing the token here would make this JVM scan upload
        # to that JS project and fail ("one linter per project"). The SARIF and the failThreshold gate work
        # fully without it. (To put the backend in Cloud too, create a SEPARATE jvm project + token.)

      # No code-scanning upload: this is a private repo without GitHub Advanced Security, so
      # github/codeql-action/upload-sarif cannot push to the Security tab (it 403s with "Resource not
      # accessible by integration"). Qodana surfaces findings as check-run annotations (the checks: write
      # permission) and the full report is kept as the artifact below. If GHAS is enabled later, re-add that
      # step with `security-events: write`, and use codeql-action@v4 (v3 is deprecated and runs on Node 20).

      - name: Upload Qodana SARIF as an artifact
        # Keeps the full SARIF report downloadable from the run for inspection (and to seed a baseline later
        # if you choose to grandfather findings instead of excluding an inspection; see qodana.yaml).
        # `if: always()` so a run that fails the threshold still yields the file.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qodana-sarif
          path: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          if-no-files-found: warn

  # The Angular SPA scan: the JS/TS counterpart to the `qodana` job above. Independent job (separate
  # runner) so a frontend finding does not block the backend report and vice versa; it mirrors that job's
  # triggers, permissions, failThreshold (0, via frontend/qodana.yaml), and artifact upload.
  qodana-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the inspection summary as a PR comment (when triggered by a PR)
      checks: write        # publish findings as check-run annotations (used on push, where there is no PR)
      actions: read        # let the action read this workflow run for its status report (telemetry)
    # The release qodana-js linter requires a Qodana Cloud connection (since 2023.2). QODANA_TOKEN is the token
    # of the Qodana Cloud project bound to qodana-js that backs this frontend scan, stored as the repo secret
    # QODANA_TOKEN_279625217 (Qodana Cloud names project tokens QODANA_TOKEN_<projectId>). The scan steps gate
    # on it: with the secret present the JS/TS scan runs; if it is ever unset they skip cleanly (no failing
    # scan, no missing-SARIF warning), and the frontend stays covered by the eslint/stylelint frontendLint gate
    # in build.yml. The backend qodana job stays tokenless on qodana-jvm-community: a Cloud project takes only
    # one linter, so the JVM and JS scans never share a project.
    env:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_279625217 }}
      QODANA_ENDPOINT: https://qodana.cloud
    steps:
      - uses: actions/checkout@v7
        with:
          # Qodana diffs the change against the base ref to label problems as new vs. pre-existing, so it
          # needs full history, mirroring the backend job.
          fetch-depth: 0
          persist-credentials: false # no step pushes back to the repository

      - name: Qodana Scan (frontend)
        # Run the JS/TS scan only when the QODANA_TOKEN secret is set; without it the qodana-js linter cannot
        # connect to Qodana Cloud, so skip the step rather than fail with no SARIF. With the token present
        # this is a blocking gate (frontend/qodana.yaml sets failThreshold: 0), so any new problem fails CI.
        if: ${{ env.QODANA_TOKEN != '' }}
        uses: JetBrains/qodana-action@v2026.1.3
        with:
          # Scan only the Angular SPA; its frontend/qodana.yaml selects the JS linter and sets
          # failThreshold: 0, so this job fails on any problem above the baseline. (Space-separated args;
          # the comma-separated form is deprecated.)
          args: --project-dir frontend
          # Keep this job's results and caches in their own directories so they never collide with the
          # backend job's (the two jobs share a workflow run).
          results-dir: ${{ runner.temp }}/qodana-frontend/results
          cache-dir: ${{ runner.temp }}/qodana-frontend/cache
          artifact-name: qodana-report-frontend # distinct from the backend job's default report artifact

      - name: Upload frontend Qodana SARIF as an artifact
        # Distinct artifact name from the backend job's `qodana-sarif` so the two uploads do not collide.
        # Upload whenever the scan ran (the token is set), including a run that fails the threshold.
        if: ${{ always() && env.QODANA_TOKEN != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: qodana-sarif-frontend
          path: ${{ runner.temp }}/qodana-frontend/results/qodana.sarif.json
          if-no-files-found: warn
