name: Build CampusCoffeeConsumption

on:
  push:
    branches: [ "**" ] # every branch

  pull_request:
    branches: [ "main" ]

  # The heavyweight browser jobs run nightly, not on every push: the full-coverage e2e (source-mapped SPA,
  # V8 instrumentation, the monocart teardown; the `e2e` job) and the prod-profile CSP smoke (`e2e-prod-csp`).
  # The fast `e2e-fast` job is the per-push merge gate.
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily

  workflow_dispatch: # manual trigger; runs all jobs, including the coverage and prod-CSP e2e the nightly schedule otherwise gates

# The build executes third-party Gradle plugins and annotation processors; restrict the token to
# read-only so a compromised dependency cannot push or modify the repository.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' # the nightly schedule runs only the heavyweight e2e jobs

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false # no step pushes back to the repository

      - uses: jdx/mise-action@v4

      # Fail fast if the Java major version drifts across the version catalog, mise.toml, and the
      # Dockerfile before spending time on the full build.
      - name: Check toolchain versions are consistent
        run: ./scripts/check-toolchain-versions.sh

      # Fail fast if the Gradle build version drifts from the latest CHANGELOG.md version.
      - name: Check version is in sync with the changelog
        run: ./scripts/check-version-sync.sh

      # `gradle build` runs `check`: ktlint, detekt, the tests, and the coverage aggregate report and gate.
      - name: Build with Gradle
        run: gradle build

      # Upload even when the build fails, so a failed coverage gate still leaves the report to inspect.
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-reports
          path: |
            coverage/build/reports/jacoco/testCodeCoverageReport/
            */build/reports/jacoco/
          if-no-files-found: warn

  # Fast end-to-end gate on every push/PR: builds the PRODUCTION (minified) SPA + jar with NO coverage
  # instrumentation, launches it on the dev profile against PostgreSQL, waits for health, and runs the
  # Playwright suite (plain `npm run e2e`, no V8 capture or monocart teardown). The full-coverage variant is
  # the nightly `e2e` job below. Separate job so a flaky browser run never blocks the merge gate.
  e2e-fast:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' # the nightly `e2e` job already exercises the browser layer

    # The dev profile's datasource expects PostgreSQL at localhost:5433 (user/password postgres). A service
    # container provides it; the health-check gates the job until it accepts connections.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@v4 # provisions Node 24 and Java 25 from mise.toml

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Cache Playwright's browser binaries so `playwright install` is a no-op on a hit; the key tracks the
      # locked dependency set so a Playwright version bump re-primes the cache.
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # Builds the production SPA + jar (no coverage), launches the jar on the dev profile, waits for health,
      # and runs `npm run e2e`. See scripts/run-e2e.sh.
      - name: Run the fast e2e (no coverage)
        run: ./scripts/run-e2e.sh

      - name: Upload the e2e report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report
          path: |
            frontend/playwright-report/
            application/build/e2e-app.log
          if-no-files-found: warn

  # End-to-end coverage (NIGHTLY): launches the real application jar under the JaCoCo agent against a
  # PostgreSQL and drives it with the Playwright suite, collecting BOTH backend JVM coverage
  # (coverage/build/jacoco/e2e.exec, mergeable into the JaCoCo gate) and frontend browser coverage
  # (frontend/coverage-e2e/, the SPA TypeScript the JaCoCo agent can never see). This is the slow run, so it
  # is gated to the nightly schedule (and manual dispatch) rather than every push; the fast `e2e-fast` job is
  # the per-push gate. Separate job so a flaky browser run never blocks the merge gate.
  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    # The dev profile's datasource expects PostgreSQL at localhost:5433 (user/password postgres). A service
    # container provides it; the health-check gates the job until it accepts connections.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@v4 # provisions Node 24 and Java 25 from mise.toml

      # Install the locked frontend deps and Playwright's chromium (with its OS deps) before the run.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # Builds the source-mapped SPA + jar, launches it under the JaCoCo agent, waits for /actuator/health,
      # runs the Playwright e2e (PW_COVERAGE=1), then stops the app so the agent flushes e2e.exec. This is the
      # :coverage:runE2eCoverage task wrapping scripts/run-e2e-coverage.sh.
      - name: Run e2e with backend + frontend coverage
        run: gradle :coverage:runE2eCoverage

      # The backend e2e exec (Part C): fold into the JaCoCo gate by re-running it now that e2e.exec exists.
      # The aggregate report/gate include build/jacoco/e2e.exec when present, so this gates on the combined
      # unit + system + acceptance + e2e coverage.
      - name: Merge e2e coverage into the JaCoCo gate
        run: gradle :coverage:coverageGate

      # Upload both coverage artifacts (and the raw e2e.exec for offline merging) even on failure, so a
      # failed e2e or gate still leaves the evidence to inspect.
      - name: Upload e2e coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-coverage
          path: |
            coverage/build/jacoco/e2e.exec
            coverage/build/jacoco/e2e-app.log
            coverage/build/reports/jacoco/testCodeCoverageReport/
            frontend/coverage-e2e/
            frontend/playwright-report/
          if-no-files-found: warn

  # Boot the PRODUCTION SPA under the prod profile + prod CSP and run the prod-csp Playwright smoke. This is
  # the only check that exercises the production build under the strict prod Content-Security-Policy in a real
  # browser (every other suite runs the dev profile). It runs nightly (and on manual dispatch), like the
  # coverage `e2e` job, so this heavyweight, browser-dependent smoke never blocks the per-push merge gate.
  e2e-prod-csp:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@v4 # provisions Node 24 and Java 25 from mise.toml

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # Builds the production SPA + jar, launches it under --spring.profiles.active=prod with fresh secrets and
      # a public https base URL, waits for health, then runs only frontend/e2e/prod-csp.spec.ts.
      - name: Run the prod-CSP smoke (production SPA under the prod profile)
        run: ./scripts/run-e2e-prod-csp.sh

      - name: Upload the prod-csp report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-prod-csp-report
          path: |
            frontend/playwright-report/
            application/build/prod-csp-app.log
          if-no-files-found: warn

  # Build the Docker image so a broken Dockerfile fails CI. Independent of the build and e2e jobs: it builds
  # the image from the multi-stage Dockerfile (which runs the Gradle bootJar inside the build stage) and does
  # not consume their outputs. The tag is throwaway; the image is not pushed.
  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' # the nightly schedule runs only the heavyweight e2e jobs

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build the Docker image
        run: docker build -t campus-coffee-consumption:ci .
