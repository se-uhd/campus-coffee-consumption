# Dependabot has no mise ecosystem, so this checks the mise-managed tools (the JDK, Gradle, gcloud, node,
# and python pinned in mise.toml). Each week it runs `mise outdated` and files (or updates) an issue ONLY
# when a tool's pin must be bumped by hand, i.e. the current pin no longer covers the newest release. A tool
# whose newer version is already within its pin (a Node patch under the `24` major pin, or anything under
# `latest`) needs only `mise install`, not a repo edit, so it is deliberately NOT reported; those were the
# weekly false positives. It only notifies; bump the pins in mise.toml by hand (Node only to the next LTS).
name: mise outdated

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays, 06:00 UTC
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: read
  issues: write

jobs:
  outdated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          install: false # only mise itself is needed; `mise outdated` does not need the tools installed

      - name: Report actionable pin bumps as an issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Capture the JSON report and the exit code explicitly: an unparseable result together with a
          # nonzero exit is a real failure (a network error, or a regression in a newer mise) and must fail
          # the workflow visibly instead of being mistaken for "nothing to bump". A nonzero exit WITH valid
          # JSON is normal (it just means some tool is behind), so it is not treated as an error.
          set +e
          report_json="$(mise outdated --json 2>/dev/null)"
          status=$?
          set -e
          if ! printf '%s' "$report_json" | jq -e . >/dev/null 2>&1; then
            if [ "$status" -ne 0 ]; then
              echo "::error::mise outdated failed (exit $status) and produced no valid JSON."
              exit 1
            fi
            report_json='{}'
          fi

          # Keep only the entries whose pin must change by hand. mise sets `bump` to the version the
          # mise.toml pin should move to when the current pin no longer covers the newest release; a null
          # `bump` means the newer version is already within the pin (so `mise install` picks it up with no
          # repo edit), which is not actionable and is not reported.
          actionable="$(printf '%s' "$report_json" | jq -c '[to_entries[].value | select(.bump != null)]')"
          count="$(printf '%s' "$actionable" | jq 'length')"
          existing="$(gh issue list --label mise-outdated --state open --json number --jq '.[0].number // empty')"

          if [ "$count" -eq 0 ]; then
            echo "No mise pin needs bumping; any outdated tools are within their pins (mise install handles them)."
            if [ -n "$existing" ]; then
              gh issue close "$existing" --comment "Closed automatically: no mise pin needs bumping. The outdated tools are within their current pins (a Node patch under the 24 major, or latest), so mise install picks them up with no repo change. This reopens only when a pin must change by hand."
              echo "Closed stale issue #$existing"
            fi
            exit 0
          fi

          echo "Actionable pin bumps:"
          printf '%s' "$actionable" | jq -r '.[] | "  \(.name): \(.requested) -> \(.bump) (latest \(.latest))"'

          gh label create mise-outdated --color FBCA04 \
            --description "Outdated mise-managed tools" --force

          table="$(printf '%s' "$actionable" | jq -r '.[] | "\(.name)\t\(.requested)\t\(.latest)\t\(.bump)"')"
          body="$(printf 'A mise-managed tool pin in `mise.toml` no longer covers the latest release and must be bumped by hand. Updates that stay within a pin are handled by `mise install` and are not listed here:\n\n```\ntool\tpinned\tlatest\tbump-to\n%s\n```\n\nBump the listed pin(s) in `mise.toml` (Node only to the next LTS, updating `@types/node` and the `engines.node` floor with it), then run `mise install`. This issue is refreshed weekly and closes automatically once no pin needs changing.' "$table")"

          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body "$body"
            echo "Updated issue #$existing"
          else
            gh issue create --title "mise: a tool pin needs bumping" --label mise-outdated --body "$body"
          fi
